<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Adega — Sommelier Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <script>
    (function(){
        try{
            // Compensar DPI scaling no Windows — o WebView2 com permonitorv2
            // renderiza em pixels físicos, então precisamos ajustar o zoom base
            var isWin = navigator.platform.indexOf('Win') > -1 || navigator.userAgent.indexOf('Windows') > -1;
            var dpiZoom = 1;
            if (isWin && window.devicePixelRatio && window.devicePixelRatio !== 1) {
                // No Windows com DPI scaling (125%, 150%, etc), o devicePixelRatio
                // reflete o fator de escala do sistema. Precisamos compensar.
                dpiZoom = window.devicePixelRatio;
            }

            var s=JSON.parse(localStorage.getItem('kiosk_settings')||'null');
            var r=document.documentElement;

            // Aplicar zoom DPI mesmo sem settings
            if (isWin && dpiZoom !== 1) {
                r.style.zoom = dpiZoom;
            }

            if(!s)return;
            function h2r(h){var m=/^#([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);return m?[parseInt(m[1],16),parseInt(m[2],16),parseInt(m[3],16)]:null;}
            function lum(rgb){return .299*rgb[0]+.587*rgb[1]+.114*rgb[2];}
            function adj(rgb,a){return rgb.map(function(c){return Math.max(0,Math.min(255,c+a));});}
            function hex(rgb){return'#'+rgb.map(function(c){return('0'+c.toString(16)).slice(-2);}).join('');}
            if(s.color_primary){r.style.setProperty('--gold',s.color_primary);var p=h2r(s.color_primary);if(p)r.style.setProperty('--gold-rgb',p.join(','));}
            if(s.color_secondary)r.style.setProperty('--gold-lt',s.color_secondary);
            if(s.color_background){
                r.style.setProperty('--base',s.color_background);r.style.background=s.color_background;
                var b=h2r(s.color_background);
                if(b){
                    var dk=lum(b)<128;
                    if(dk){r.style.setProperty('--surface','rgba(255,255,255,.04)');r.style.setProperty('--surface-alt','rgba(255,255,255,.06)');r.style.setProperty('--border','rgba(255,255,255,.08)');r.style.setProperty('--shadow','rgba(0,0,0,.3)');}
                    else{r.style.setProperty('--surface',s.color_background);r.style.setProperty('--surface-alt',hex(adj(b,-12)));r.style.setProperty('--border','rgba(0,0,0,.1)');r.style.setProperty('--shadow','rgba(0,0,0,.12)');}
                }
            }
            if(s.color_text){r.style.setProperty('--cream',s.color_text);var t=h2r(s.color_text);if(t){r.style.setProperty('--cream-rgb',t.join(','));r.style.setProperty('--muted','rgba('+t.join(',')+', .45)');}}
            if(s.element_scale)r.style.zoom=(s.element_scale||1)*dpiZoom;
            if(s.font_scale)r.style.setProperty('--font-scale',s.font_scale);
        }catch(e){}
    })();
    </script>
</head>
<body>
<div id="app"></div>
<script src="./src/main.js" type="module"></script>
</body>
</html>
