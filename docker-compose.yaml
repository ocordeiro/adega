# compose.yaml
services:
  frankenphp:
    build:
      context: .
    volumes:
      - .:/var/www/app
    environment:
      - APP_PUBLIC=/var/www/app/public
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "octane:status"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8000:8000"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-codigo_de_barras}
    ports:
      - 3306:3306
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  queue:
    build:
      context: .
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - .:/var/www/app
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
